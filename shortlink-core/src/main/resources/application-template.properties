spring.application.name=shortlink-core

# MySQL配置（请复制此文件为 application.properties 并填真实值）
spring.datasource.url=jdbc:mysql://localhost:3306/shortlink_db
spring.datasource.username=你的数据库用户名
spring.datasource.password=你的数据库密码
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

shortlink.base-url=http://localhost:8080/

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=你的数据库密码

# 缓存过期时间（秒），短链缓存 1 小时
shortlink.cache.ttl=3600